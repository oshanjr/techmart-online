<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Admin Portal</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Login View -->
    <div id="admin-login-view" class="admin-view active">
        <div class="login-card glass-panel">
            <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="admin-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn-primary full-width">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="admin-dashboard-view" class="admin-view">
        <nav class="navbar" style="position: relative;">
            <div class="nav-container">
                <a href="#" class="brand">
                    <i data-lucide="shield" class="brand-icon"></i>
                    Admin Portal
                </a>
                <div class="nav-links">
                    <a href="#" class="tab-link active" data-tab="tab-products">Products (CMS)</a>
                    <a href="#" class="tab-link" data-tab="tab-orders">Orders</a>
                    <a href="index.html">Back to Store</a>
                </div>
                <button id="btn-logout" class="btn-icon"><i data-lucide="log-out"></i></button>
            </div>
        </nav>

        <main class="container" style="margin-top: 2rem;">
            
            <!-- Products CMS Tab -->
            <div id="tab-products" class="dashboard-tab active">
                <div class="section-header">
                    <h2>Content Management (Products)</h2>
                    <button id="btn-add-product" class="btn-primary"><i data-lucide="plus"></i> Add Product</button>
                </div>
                
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>SKU</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Orders Tab -->
            <div id="tab-orders" class="dashboard-tab">
                <div class="section-header">
                    <h2>Order Management</h2>
                    <select id="order-status-filter" style="padding: 0.5rem; background: var(--bg-surface); color: white; border: 1px solid var(--border-light); border-radius: 4px;">
                        <option value="">All Pending</option>
                        <option value="PROCESSING">Processing</option>
                        <option value="SHIPPED">Shipped</option>
                        <option value="DELIVERED">Delivered</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
                
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Total</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-list">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Product Modal (CMS Create/Update) -->
    <div id="cms-product-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 600px;">
            <div class="modal-header">
                <h2 id="cms-modal-title">Add Product</h2>
                <button id="cms-modal-close" class="btn-icon"><i data-lucide="x"></i></button>
            </div>
            <form id="cms-product-form">
                <input type="hidden" id="cms-id">
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>SKU</label>
                        <input type="text" id="cms-sku" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Category</label>
                        <input type="text" id="cms-category" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="cms-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="cms-desc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL (Unsplash/Pexels/Drive)</label>
                    <input type="url" id="cms-image" placeholder="https://...">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" id="cms-price" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Stock Quantity</label>
                        <input type="number" id="cms-stock" required>
                    </div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="cms-active" checked style="width: auto;">
                    <label for="cms-active" style="margin: 0;">Is Active?</label>
                </div>
                
                <button type="submit" class="btn-primary full-width mt-4">Save Product</button>
            </form>
        </div>
    </div>
    <div id="cms-overlay" class="overlay"></div>
    
    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <span id="toast-message">Notification</span>
    </div>

    <script src="js/admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
